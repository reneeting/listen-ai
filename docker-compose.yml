version: '3.8'

services:
  stat:
    build: ./stat
    ports:
      - "8002:8002"
    networks:
      - listenai-network

  nlp:
    build: ./nlp
    ports:
      - "8001:8001"
    networks:
      - listenai-network

  gateway:
    build: ./gateway
    ports:
      - "8000:8000"
    depends_on:
      - stat
      - nlp
    networks:
      - listenai-network

  frontend:
    build: ./frontend
    ports:
      - "8501:8501"
    depends_on:
      - gateway
    networks:
      - listenai-network

networks:
  listenai-network:
    driver: bridge